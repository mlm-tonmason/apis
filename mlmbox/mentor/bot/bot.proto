syntax = "proto3";

package mlmbox.mentor.bot;

import "mlmbox/types/account.proto";
import "google/protobuf/empty.proto";

// Сервис AiMentor предоставляет gRPC-интерфейс для взаимодействия Telegram-бота
// с платформой MLMBox. Включает методы аутентификации и получения данных аккаунта,
// управления сообщениями AI-ментора, запроса балансов пользователей,
// а также инициирования и отслеживания покупки подписок.
service AiMentor {
	// Аутентификация пользователя Telegram в системе MLMBox.
	// Создаёт или возвращает существующий аккаунт на основе данных Telegram-авторизации.
	rpc Auth (AuthRequest) returns (mlmbox.types.Account) {}

	// Получить данные аккаунта по Telegram ID пользователя.
	rpc Get (GetRequest) returns (mlmbox.types.Account) {}

	// Зафиксировать использование сообщения AI-ментора (списать из лимита).
	rpc MessageUse (GetRequest) returns (google.protobuf.Empty) {}

	// Получить баланс пользователя по distributor_id.
	// Возвращает список пар (валюта, сумма) по всем доступным валютам.
	rpc GetBalance (GetBalanceRequest) returns (GetBalanceResponse) {}

	// Инициировать покупку подписки.
	// Возвращает текущее состояние обработки заявки и статус ошибки (если есть).
	rpc SubscriptionPurchase (SubscriptionPurchaseRequest) returns (SubscriptionPurchaseResponse) {}

	// Получить состояние обработки заявки на покупку подписки по request_id.
	rpc SubscriptionPurchaseStatus (SubscriptionPurchaseStatusRequest) returns (SubscriptionPurchaseResponse) {}
}

// ─── Existing messages ───

message AuthRequest {
	message User {
		uint64 id = 1;
		string first_name = 2;
		string last_name = 3;
		string username = 4;
		string language_code = 5;
		bool is_premium = 6;
		string photo_url = 7;
	}
	uint32 channel_id = 1;
	uint64 bot_id = 2;
	uint32 auth_date = 3;
	User user = 4;
	string ref_link_id = 5;
}

message GetRequest {
	int64 telegram_id = 1;
}

// ─── GetBalance ───

message GetBalanceRequest {
	uint32 distributor_id = 1;
}

message GetBalanceResponse {
	message Balance {
		string currency_name = 1;
		string value = 2;
	}
	repeated Balance items = 1;
}

// ─── SubscriptionPurchase ───

message SubscriptionPurchaseRequest {
	uint32 request_id = 1;
	uint32 distributor_id = 2;
	uint32 autor_id = 3;
	uint32 plan_id = 4;
	string currency_usdt_value = 5;
	string currency_ton_value = 6;
}

// ─── SubscriptionPurchaseStatus ───

message SubscriptionPurchaseStatusRequest {
	uint32 request_id = 1;
}

// ─── Shared response ───

message SubscriptionPurchaseResponse {
	enum Status {
		PENDING = 0;    // Заявка принята, ожидает обработки
		PROCESSING = 1; // Заявка в процессе обработки
		COMPLETED = 2;  // Заявка успешно выполнена
		FAILED = 3;     // Заявка завершилась с ошибкой
	}
	enum Error {
		NONE = 0;                  // Ошибок нет
		INSUFFICIENT_FUNDS = 1;   // Недостаточно средств
		DUPLICATE_REQUEST = 2;    // Заявка с таким request_id уже существует
		INTERNAL_ERROR = 3;       // Внутренняя ошибка сервера
	}
	uint32 request_id = 1;
	Status status = 2;
	Error error = 3;
}
