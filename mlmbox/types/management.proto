syntax = "proto3";

package mlmbox.types;

// Management представляет именованный источник реферальной ссылки, создаваемый аккаунтом.
// Каждый источник позволяет владельцу аккаунта создавать несколько различных реферальных
// ссылок (с пользовательскими названиями и тегами) для отслеживания эффективности
// привлечения партнёров через разные маркетинговые каналы.
message Management {

  // Id — скалярная обёртка, используемая как идентификатор реферального источника в запросах.
  message Id {
    // Числовой идентификатор реферального источника.
    uint32 source_id = 1;
  }

  // List — коллекция записей Management, возвращаемая списочными запросами.
  message List {
    repeated mlmbox.types.Management items = 1;
  }

  // Уникальный числовой идентификатор реферального источника.
  uint32 source_id = 1;
  // Человекочитаемая метка данного источника (например, "Кампания в Instagram").
  string title = 2;
  // Короткий буквенно-цифровой тег, используемый в URL (например, "ig2025").
  string tag = 3;
  // Признак публичной видимости источника: виден ли он и принимает ли новые регистрации.
  // Скрытые источники не отображаются в списках ссылок для партнёров.
  bool visible = 4;
  // Полный идентификатор реферальной ссылки, сгенерированной для данного источника.
  string ref_link_id = 5;
  // Количество аккаунтов, зарегистрировавшихся через данный реферальный источник.
  uint32 partners_quantity = 6;
}