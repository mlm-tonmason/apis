syntax = "proto3";

package mlmbox.types;

import "mlmbox/types/asset.proto";

// Quest представляет задание или испытание, которое участники платформы могут выполнить
// для получения вознаграждения в активах. Поддерживаются три модели жизненного цикла квестов:
//
//   - RecurringQuest       — выполняется многократно с периодом перезарядки.
//   - OneTimeQuest         — выполняется однократно и требует ручной или автоматической верификации.
//   - OneTimeExpiredQuest  — выполняется однократно в рамках ограниченного временного окна.
message Quest {

  // Id — скалярная обёртка для ссылки на квест по его числовому идентификатору.
  message Id {
    // Числовой идентификатор квеста.
    uint32 quest_id = 1;
  }

  // List — коллекция записей Quest, возвращаемая конечной точкой AllQuests.
  message List {
    repeated Quest quests = 1;
  }

  // RecurringQuest описывает квест, который сбрасывается после периода перезарядки
  // и может выполняться одним пользователем многократно (например, ежедневный вход).
  message RecurringQuest {
    // Status указывает, доступен ли квест для выполнения прямо сейчас.
    enum Status {
      // Квест можно выполнить в данный момент.
      AVAILABLE = 0;
      // Квест выполнен, таймер перезарядки активен.
      COMPLETED = 1;
    }
    // Unix-временная метка, когда квест снова станет доступным.
    uint32 next_available_at = 1;
    // Unix-временная метка последнего успешного выполнения.
    uint32 last_completed_at = 2;
    // Текущий статус доступности многоразового квеста.
    Status status = 3;
  }

  // OneTimeQuest описывает квест, требующий внешней верификации перед выдачей
  // вознаграждения (например, подписка на Telegram-канал).
  message OneTimeQuest {
    // Status отслеживает жизненный цикл проверки одноразового квеста.
    enum Status {
      // Квест ещё не начат.
      NOT_STARTED = 0;
      // Участник отправил квест на проверку; ожидается верификация.
      PENDING_REVIEW = 1;
      // Верификация прошла успешно, вознаграждение начислено.
      COMPLETED = 2;
      // Верификация не прошла (например, подписка не найдена).
      FAILED = 3;
    }
    // Внешний URL для верификации (например, ссылка на Telegram-канал).
    string verification_url = 1;
    // Unix-временная метка последней попытки верификации.
    uint32 checked_at = 2;
    // Текущий статус верификации одноразового квеста.
    Status status = 3;
  }

  // OneTimeExpiredQuest описывает квест, доступный в течение ограниченного времени,
  // который можно выполнить однократно до истечения срока.
  message OneTimeExpiredQuest {
    // Status отражает состояние выполнения и истечения срока квеста.
    enum Status {
      // Квест находится в пределах окна доступности и может быть выполнен.
      AVAILABLE = 0;
      // Квест успешно выполнен до истечения срока.
      COMPLETED = 1;
      // Окно доступности закрылось без успешного выполнения.
      EXPIRED = 2;
    }
    // Unix-временная метка, после которой квест более недоступен.
    uint32 expired_at = 1;
    // Unix-временная метка выполнения квеста (0, если не выполнен).
    uint32 completed_at = 2;
    // Текущее состояние ограниченного по времени одноразового квеста.
    Status status = 3;
  }

  // Уникальный числовой идентификатор квеста.
  uint32 id = 1;
  // Человекочитаемое название квеста, отображаемое в интерфейсе.
  string title = 2;
  // Размеченное объединение типа жизненного цикла квеста — должно быть задано ровно одно поле.
  oneof quest_type {
    // Квест может повторяться после периода перезарядки.
    RecurringQuest recurring = 3;
    // Квест выполняется однократно и требует верификации.
    OneTimeQuest one_time = 4;
    // Квест выполняется однократно в ограниченном временном окне.
    OneTimeExpiredQuest one_time_expired = 6;
  }
  // Сумма актива, зачисляемая на кошелёк участника при успешном выполнении.
  mlmbox.types.Asset.Amount reward_amount = 5;
}
