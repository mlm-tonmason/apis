syntax = "proto3";

package mlmbox.types;

// Relationship описывает структурное положение одного аккаунта или позиции матрицы
// относительно текущего аутентифицированного (или запрашиваемого) аккаунта.
// Встраивается в объекты аккаунтов и позиций, позволяя вызывающей стороне
// контекстуализировать возвращаемые данные в рамках собственной сетевой иерархии.
message Relationship {
  // Kind классифицирует отношение указанной сущности к просматривающему аккаунту.
  enum Kind {
    // Тип отношения не определён или неприменим.
    UNKNOWN = 0;
    // Указанная сущность принадлежит самому просматривающему аккаунту.
    PERSONAL = 1;
    // Указанная сущность находится в структуре нижней линии (downline) просматривающего аккаунта.
    TEAM = 2;
    // Указанная сущность является предком (upline) просматривающего аккаунта.
    SPONSOR = 3;
    // Указанная сущность не входит ни в верхнюю, ни в нижнюю линию просматривающего аккаунта.
    OUTSIDER = 4;
  }

  // Структурный тип отношения.
  Kind kind = 1;
  // Глубина указанной сущности относительно просматривающего аккаунта
  // (1 = прямой партнёр/спонсор, 2 = второй уровень и т.д.).
  uint32 level = 2;
  // Идентификатор ветки в слоте матрицы спонсора
  // (индекс ветки, которую занимает указанная сущность, начиная с 0).
  uint32 branch = 3;
}