syntax = "proto3";

package mlmbox.types;

import "mlmbox/types/asset.proto";

// Invoice объединяет все типы запросов и ответов, используемые в процессе покупки
// позиций матрицы. Процесс разбит на два последовательных этапа:
//
//  1. PreviewPurchase — пробный расчёт стоимости без выполнения финансовых операций.
//  2. VerifiedPurchase — подтверждает покупку, создаёт позиции и списывает баланс
//     с кошелька участника.
message Invoice {

  // Request содержит набор позиций, которые участник хочет приобрести,
  // сгруппированных по дереву и количеству.
  message Request {
    // Entity указывает, сколько позиций купить в конкретном дереве.
    message Entity {
      // Целевое дерево, в котором будут приобретены позиции.
      uint32 tree_id = 1;
      // Количество позиций для покупки в данном дереве.
      uint32 quantity = 2;
    }
    // Список пар (дерево, количество), формирующих заказ на покупку.
    repeated Entity entities = 2;
  }

  // PreviewResponse предоставляет постатейную разбивку стоимости по деревьям
  // до подтверждения покупки. Клиент должен отобразить это пользователю для подтверждения.
  message PreviewResponse {
    // Item содержит детали ценообразования для одного дерева в рамках заказа.
    message Item {
      // Дерево, для которого применяется данная строка ценообразования.
      uint32 tree_id = 1;
      // Актив, используемый для оплаты позиций в данном дереве.
      uint32 asset_id = 2;
      // Базовая цена одной позиции в данном дереве (десятичная строка).
      string price_value = 3;
      // Сумма, которая будет разблокирована/зачислена как начальный баланс позиции
      // (десятичная строка).
      string unlock_value = 4;
      // Итоговая сумма за все позиции в данном дереве (десятичная строка).
      string amount_value = 5;
      // Количество позиций, включённых в данную строку.
      uint32 quantity = 6;
    }
    // Постатейная разбивка стоимости по деревьям.
    repeated Item items = 1;
    // Агрегированные итоговые суммы по активам для всех деревьев в заказе.
    repeated mlmbox.types.Asset.Amount bill_amounts = 2;
  }

  // VerifiedResponse возвращается после успешного подтверждения покупки.
  // Содержит список каждой созданной (или зарезервированной) позиции для справки.
  message VerifiedResponse {
    // Item описывает одну позицию, созданную или зарезервированную в результате покупки.
    message Item {
      // Дерево, в котором создана позиция.
      uint32 tree_id = 1;
      // Порядковый номер позиции в дереве (глобальный счётчик).
      uint32 tree_entity_id = 2;
      // Порядковый номер данной позиции среди позиций аккаунта в данном дереве.
      uint32 tree_account_entity_id = 3;
      // Уникальный идентификатор вновь созданной позиции матрицы.
      uint32 position_id = 4;
      // True, если позиция находится в состоянии бронирования (резервации),
      // ожидая активации, а не является немедленно активной.
      bool is_booking = 5;
    }
    // Список созданных или зарезервированных позиций в результате покупки.
    repeated Item items = 1;
  }
}