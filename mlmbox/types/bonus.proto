syntax = "proto3";

package mlmbox.types;

// Bonus объединяет все типы и статистику, связанные с системой начисления бонусов.
// Бонусы зачисляются на кошельки участников при наступлении определённых событий
// на платформе (выплаты матрицы, активность прямых рефералов, выполнение квестов, подарки).
message Bonus {

  // Kind классифицирует источник начисления бонуса.
  message Kind {
    // Id перечисляет все поддерживаемые типы происхождения бонусов.
    enum Id {
      // Неизвестный или неуказанный тип бонуса.
      UNKNOWN = 0;
      // Ручной подарок, начисленный администрацией платформы.
      GIFT = 1;
      // Бонус за прямого реферала — начисляется при активации позиции
      // лично приглашённым партнёром.
      BONUS_DIRECT = 2;
      // Бонус за переполнение матрицы — начисляется при завершении цикла
      // позиции в матрице спонсора.
      BONUS_MATRIX = 3;
      // Вознаграждение за выполнение квеста, зачисляемое после верификации.
      QUEST = 4;
    }
    // Определённый тип бонуса.
    Id kind_id = 1;
  }

  // LevelPercent описывает правило начисления процента на конкретном уровне глубины
  // реферального дерева (используется при расчёте бонуса за прямого реферала).
  message LevelPercent {
    // Уровень глубины в цепочке спонсоров (1 = прямой спонсор, 2 = дед и т.д.).
    uint32 level = 1;
    // Процент от суммы сделки/активации, начисляемый на данном уровне (десятичная строка).
    string percent = 2;
  }

  // Value фиксирует отдельное событие начисления бонуса с разбивкой по типу.
  message Value {
    // Asset связывает актив с Value; используется в постатейных разбивках бонусов.
    message Asset {
      // Актив, к которому относится данное значение.
      uint32 asset_id = 1;
      // Значение бонуса для указанного актива.
      Value value = 2;
    }
    // Тип бонуса, к которому относится данное значение.
    Kind.Id bonus_id = 1;
    // Итоговая сумма, заработанная по данному типу бонуса (десятичная строка).
    string earned_value = 2;
  }

  // Summary агрегирует доходы от бонусов всех типов в рамках заданного контекста
  // (например, отдельный актив кошелька или полная статистика аккаунта).
  message Summary {
    // Asset связывает актив с Summary, позволяя агрегировать данные по активам.
    message Asset {
      // Актив, к которому относится данное резюме.
      uint32 asset_id = 1;
      // Агрегированное резюме для указанного актива.
      Summary summary = 2;
    }
    // Общая сумма, заработанная по всем типам бонусов (десятичная строка).
    string earned_value = 1;
    // Разбивка доходов по отдельным типам бонусов.
    repeated Value values = 2;
  }
}