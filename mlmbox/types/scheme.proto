syntax = "proto3";

package mlmbox.types;
import "mlmbox/types/account.proto";
import "mlmbox/types/asset.proto";
import "mlmbox/types/exchanger.proto";
import "mlmbox/types/locale.proto";
import "mlmbox/types/wallet.proto";

// Scheme — снимок конфигурации платформы, возвращаемый RPC App.SchemeInfo.
// Агрегирует все данные конфигурации и справочники, необходимые клиентскому
// приложению для инициализации состояния в одном обращении к серверу:
//
//   - доступные активы и их курсы обмена
//   - поддерживаемые локали интерфейса
//   - настройки активов кошелька и провайдеры обработки платежей
//   - топология деревьев матрицы (группы и отдельные деревья)
//   - текущее глобальное количество участников
message Scheme {
  // Все активы, поддерживаемые на платформе (валюты и токены).
  repeated mlmbox.types.Asset assets = 1;
  // Текущие курсы покупки/продажи для всех активных торговых пар.
  repeated mlmbox.types.Exchanger.Rate asset_pair_exchange_rates = 2;
  // Список всех поддерживаемых платформой локалей интерфейса.
  repeated mlmbox.types.Locale locales = 3;
  // Конфигурации активов кошелька для аутентифицированного аккаунта, включая
  // балансы, настройки истории транзакций и лимиты переводов.
  repeated mlmbox.types.Wallet.Asset wallet_assets = 4;
  // Доступные провайдеры обработки платежей и настройки пополнения/
  // вывода средств по каждому активу.
  repeated mlmbox.types.Wallet.Processing wallet_processings = 5;
  // Метаданные групп деревьев (используются для группировки деревьев в интерфейсе).
  repeated mlmbox.types.Tree.Group tree_groups = 6;
  // Полный список деревьев матрицы, доступных на платформе, включая их
  // топологию, ценообразование и требования к активации.
  repeated mlmbox.types.Tree trees = 7;
  // Общее количество зарегистрированных аккаунтов на платформе (живая метрика).
  uint32 metrics_accounts_quantity = 8;
}