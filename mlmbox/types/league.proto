syntax = "proto3";

package mlmbox.types;

// League представляет соревновательный дивизион в рейтинговой системе платформы.
// Участники распределяются по лигам на основе накопленного балла или объёма сети.
// Каждая лига охватывает определённый диапазон баллов и содержит таблицу лидеров
// с ранжированными аккаунтами.
message League {

  // Id — простая скалярная обёртка, используемая как идентификатор лиги
  // в запросах, где требуется только номер лиги.
  message Id {
    // Числовой идентификатор лиги.
    uint32 league_id = 1;
  }

  // Rank хранит текущее положение отдельного аккаунта в лигах, объединяя
  // лигу, в которой он находится, с его позицией внутри неё.
  message Rank {
    // Лига, в которой в данный момент находится аккаунт.
    uint32 league_id = 1;
    // Позиция (номер ранга) аккаунта в таблице лидеров лиги.
    uint32 rank = 2;
  }

  // Header описывает метаданные лиги, включая границы баллов
  // и текущее количество участников.
  message Header {
    // List — коллекция записей Header, возвращаемая запросом списка лиг.
    message List {
      repeated Header items = 1;
    }

    // Числовой идентификатор лиги.
    uint32 league_id = 1;
    // Человекочитаемое название лиги, отображаемое в интерфейсе (например, "Бронза", "Серебро").
    string title = 2;
    // Нижняя граница (включительно) диапазона баллов для данной лиги. Десятичная строка.
    string range_ge = 3;
    // Верхняя граница (исключительно) диапазона баллов для данной лиги. Десятичная строка.
    string range_lt = 4;
    // Текущее количество аккаунтов, помещённых в данную лигу.
    uint32 quantity = 5;
  }
}