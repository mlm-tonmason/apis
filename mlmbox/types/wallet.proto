syntax = "proto3";

package mlmbox.types;

import "mlmbox/types/asset.proto";
import "mlmbox/types/account.proto";
import "mlmbox/types/bonus.proto";
import "mlmbox/types/status.proto";

// Wallet — верхнеуровневый финансовый контейнер, хранящий активы участника.
// Агрегирует балансы по всем активам, историю транзакций, конфигурации провайдеров
// обработки платежей и NFT-активы в единый объект ответа, возвращаемый RPC Wallet.Info.
message Wallet {

  // Asset представляет состояние кошелька по одной валюте или токену,
  // включая баланс, список транзакций и настройки переводов.
  message Asset {

    // List — коллекция записей Asset, возвращаемая RPC AssetsAll.
    message List {
      repeated mlmbox.types.Wallet.Asset items = 1;
    }

    // Transaction представляет одну запись в книге учёта кошелька актива.
    // Каждая транзакция имеет тип, статус, сумму и метаданные, описывающие
    // происхождение финансового события.
    message Transaction {

      // Id однозначно идентифицирует транзакцию в рамках конкретного кошелька актива.
      message Id {
        // Кошелёк актива, к которому относится данная транзакция.
        uint32 asset_id = 1;
        // Порядковый идентификатор транзакции в кошельке актива.
        uint32 transaction_id = 2;
      }

      // Kind классифицирует экономическую природу транзакции.
      message Kind {
        // Id перечисляет все поддерживаемые типы транзакций.
        enum Id {
          // Неизвестная или неклассифицированная транзакция (на практике не должна встречаться).
          UNKNOWN = 0;
          // Транзакция отменена до расчёта.
          CANCELED = 1;
          // Кредит от начисления бонуса или вознаграждения.
          EARNED = 2;
          // Дебет за приобретение продукта или услуги платформы.
          SPENT = 3;
          // Входящее пополнение с внешнего блокчейн-адреса.
          DEPOSIT = 4;
          // Исходящий вывод на внешний блокчейн-адрес.
          WITHDRAWAL = 5;
          // Входящий внутренний перевод между кошельками участников.
          DEPOSIT_WALLET_TRANSFER = 6;
          // Исходящий внутренний перевод между кошельками участников.
          WITHDRAWAL_WALLET_TRANSFER = 7;
          // Операция обмена валюты внутри обменника платформы.
          EXCHANGE = 8;
          // Комиссия, взимаемая за обработку вывода средств.
          WITHDRAWAL_FEE = 9;
          // Баланс безвозвратно уничтожен (событие сжигания).
          BURNED = 10;
          // Баланс временно заморожен (удержание резерва).
          HOLD = 11;
          // Ранее замороженный баланс освобождён обратно в доступный.
          RELEASE = 12;
        }
        // Определённый тип транзакции.
        Id kind_id = 1;
      }

      // List — коллекция записей Transaction, возвращаемая списочными запросами.
      message List {
        repeated mlmbox.types.Wallet.Asset.Transaction items = 1;
      }

      // Metadata предоставляет контекстные детали о происхождении транзакции.
      // В зависимости от типа транзакции заполняется ровно один вариант oneof.
      message Metadata {

        // Deposit содержит блокчейн-детали входящего пополнения.
        message Deposit {
          // Идентификатор провайдера обработки платежей, принявшего пополнение.
          uint32 processing_id = 1;
          // Хеш транзакции в блокчейне.
          string hash = 2;
        }

        // Withdrawal содержит детали запроса на исходящий вывод средств.
        message Withdrawal {
          // Идентификатор провайдера обработки платежей, обрабатывающего вывод.
          uint32 processing_id = 1;
          // Адрес назначения в блокчейне.
          string address = 2;
          // Опциональный мемо или тег, требуемый некоторыми сетями (например, TON, XRP).
          string memo = 3;
          // Хеш транзакции в блокчейне после её отправки.
          string hash = 4;
        }

        // PositionHeader ссылается на позицию матрицы, связанную с финансовым событием
        // (например, создание позиции, реинвестирование, выплата).
        message PositionHeader {
          // Дерево, в котором находится позиция.
          uint32 tree_id = 1;
          // Уникальный идентификатор позиции.
          uint32 position_id = 2;
          // Порядковый номер данной позиции среди позиций аккаунта.
          uint32 tree_account_entity_id = 3;
        }

        // Bonus несёт детальную атрибуцию для транзакции начисления бонуса.
        message Bonus {
          // SourceMatrix описывает бонус, происходящий из выплаты цикла матрицы.
          message SourceMatrix {
            // Дерево, в котором произошла выплата.
            uint32 tree_id = 1;
            // Позиция, получившая выплату (бенефициар).
            uint32 target_position_id = 2;
            // Порядковый номер позиции-бенефициара.
            uint32 target_tree_account_entity_id = 3;
            // Позиция, инициировавшая выплату (источник переполнения).
            uint32 source_position_id = 4;
            // Порядковый номер инициирующей позиции.
            uint32 source_tree_account_entity_id = 5;
            // Уровень глубины в реферальной цепочке, на котором заработан бонус.
            uint32 level = 6;
          }

          // SourceDirect описывает бонус, происходящий от активации прямого реферала
          // (партнёр купил новую позицию).
          message SourceDirect {
            // Дерево, в котором создана активирующая позиция.
            uint32 tree_id = 1;
            // Аккаунт, совершивший покупку (прямой партнёр).
            uint32 account_id = 2;
            // Позиция, созданная при покупке.
            uint32 position_id = 3;
            // Порядковый номер созданной позиции.
            uint32 tree_account_entity_id = 4;
          }

          // Тип бонуса, к которому относится данное начисление.
          mlmbox.types.Bonus.Kind.Id bonus_id = 1;
          // Дискриминированный источник события бонуса.
          oneof source {
            // Произвольное текстовое описание (используется для подарочных и прочих бонусов).
            string description = 2;
            // Бонус из выплаты цикла матрицы.
            SourceMatrix matrix = 3;
            // Бонус за активацию прямого реферала.
            SourceDirect direct = 4;
            // Бонус за выполнение квеста (идентификатор квеста).
            uint32 quest_id = 5;
          }
        }

        // Дискриминированная полезная нагрузка метаданных — будет задано ровно одно поле.
        oneof unique_field {
          // Общее человекочитаемое описание для прочих транзакций.
          string description = 1;
          // Блокчейн-детали для пополнений.
          Deposit deposit = 2;
          // Детали вывода средств.
          Withdrawal withdrawal = 3;
          // ID дерева для дебета резервирования позиции keeper.
          uint32 keeper_booking_tree_id = 4;
          // ID дерева для дебета создания начальной позиции keeper.
          uint32 keeper_initial_tree_id = 5;
          // Заголовок позиции для создания позиции, инициированного реинвестированием.
          PositionHeader keeper_reinvest = 6;
          // Заголовок позиции для обычной покупки создания позиции.
          PositionHeader position_created = 7;
          // Детальная атрибуция начисления бонуса.
          Bonus bonus = 8;
          // ID аккаунта контрагента для внутренних переводов между кошельками.
          uint32 account_id = 9;
          // Полная информация об аккаунте контрагента для внутренних переводов.
          mlmbox.types.Account.Info account = 10;
          // Ссылка на связанную транзакцию (например, комиссия, привязанная к выводу).
          uint32 transaction_id = 11;
          // Детали суммы актива для операций обмена.
          mlmbox.types.Asset.Amount amount = 12;
        }
      }

      // Уникальный порядковый идентификатор данной транзакции в кошельке актива.
      uint32 transaction_id = 1;
      // Экономическая природа данной транзакции (пополнение, вывод, бонус и т.д.).
      Kind.Id kind_id = 2;
      // Состояние расчёта данной транзакции.
      mlmbox.types.Status.Transaction status_id = 3;
      // Сумма транзакции в виде десятичной строки (всегда положительная).
      string amount = 4;
      // Комиссия за данную транзакцию (десятичная строка; "0" при отсутствии комиссии).
      string fee = 5;
      // Текущий баланс кошелька после применения данной транзакции (десятичная строка).
      string balance = 6;
      // Unix-временная метка создания данной транзакции.
      uint32 created_at = 7;
      // Контекстные метаданные, описывающие происхождение данной транзакции.
      Metadata metadata = 8;
    }

    // Числовой идентификатор актива, к которому относится данная запись кошелька.
    uint32 asset_id = 1;
    // Текущий доступный баланс по данному активу (десятичная строка).
    string asset_balance = 2;
    // Постраничная история транзакций для данного кошелька актива.
    repeated Transaction transactions = 3;
    // Агрегированная статистика бонусного дохода по всем типам бонусов для данного актива.
    mlmbox.types.Bonus.Summary income_bonuses_statistics = 4;
    // Разрешено ли участнику инициировать внутренние переводы данного актива другим участникам.
    bool settings_transfer_enabled = 5;
    // Минимальная сумма, которую можно отправить в одном внутреннем переводе (десятичная строка).
    string settings_transfer_limit_min = 6;
  }

  // Processing представляет платёжный шлюз или блокчейн-сеть, через которую
  // обрабатываются пополнения и выводы средств.
  message Processing {

    // Id — полиморфный идентификатор провайдера обработки платежей —
    // по числовому ID или каноническому имени.
    message Id {
      oneof unique_field {
        // Числовой идентификатор провайдера обработки платежей.
        uint32 processing_id = 1;
        // Каноническое имя провайдера (например, "TON", "BNB_BSC").
        string processing_name = 2;
      }
    }

    // Asset описывает конфигурацию конкретного актива в рамках провайдера обработки
    // (например, USDT в сети TON).
    message Asset {

      // Id идентифицирует пару (провайдер, актив) в запросах истории вывода
      // и настроек.
      message Id {
        // Ссылка на провайдера обработки.
        mlmbox.types.Wallet.Processing.Id processing_id = 1;
        // Ссылка на актив.
        mlmbox.types.Asset.Id asset_id = 2;
      }

      // WithdrawalAddressHistory хранит список адресов назначения, ранее использованных
      // данным аккаунтом для выводов через данный провайдер/актив.
      message WithdrawalAddressHistory {
        // Entity — одна запись исторического адреса.
        message Entity {
          // Блокчейн-адрес, ранее использованный для вывода.
          string address = 1;
          // Unix-временная метка последнего вывода на данный адрес.
          uint32 last_used_at = 2;
        }
        // Упорядоченный список ранее использованных адресов для вывода.
        repeated Entity items = 1;
      }

      // Идентификатор актива в рамках провайдера обработки.
      uint32 asset_id = 1;
      // Разрешены ли пополнения через данную комбинацию провайдер/актив.
      bool settings_deposit_enabled = 2;
      // Разрешены ли выводы через данную комбинацию провайдер/актив.
      bool settings_withdrawal_enabled = 3;
      // Фиксированная базовая комиссия за каждый вывод (десятичная строка).
      string settings_withdrawal_fee_base = 4;
      // Процентная комиссия за каждый вывод (десятичная строка, например "0.001").
      string settings_withdrawal_fee_percent = 5;
      // Минимальная разрешённая сумма вывода (десятичная строка).
      string settings_withdrawal_operation_value_min = 6;
      // Максимальная разрешённая сумма вывода за одну операцию (десятичная строка).
      string settings_withdrawal_operation_value_max = 7;
    }

    // List — коллекция записей Processing, возвращаемая RPC ProcessingsAll.
    message List {
      repeated Processing items = 1;
    }

    // Числовой идентификатор данного провайдера обработки.
    uint32 processing_id = 1;
    // Каноническое имя провайдера (например, "TON", "BNB_BSC").
    string processing_name = 2;
    // Конфигурация по каждому активу для данного провайдера.
    repeated Asset assets = 3;
  }

  // NFT представляет невзаимозаменяемый токен (NFT), принадлежащий аккаунту,
  // идентифицируемый по коллекции и сущности в ней.
  message NFT {
    // Идентификатор NFT-коллекции.
    uint32 collection_id = 1;
    // Идентификатор конкретного NFT в коллекции.
    uint32 entity_id = 2;
  }

  // Все активные кошельки участника (одна запись на каждый поддерживаемый актив).
  repeated Asset assets = 1;
  // Провайдеры обработки платежей, доступные участнику.
  repeated Processing processings = 2;
  // NFT-активы участника.
  repeated NFT nft = 3;
}