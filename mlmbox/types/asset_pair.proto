syntax = "proto3";

package mlmbox.types;
import "mlmbox/types/asset.proto";

// AssetPair определяет направленную торговую пару между исходным и целевым активами
// (например, USDT → TON). Пары используются сервисом Exchanger для предоставления
// курсов покупки/продажи при обмене валют.
message AssetPair {

  // Id — полиморфный идентификатор для разрешения торговой пары по числовому ID,
  // каноническому имени или по явным исходному и целевому активам.
  message Id {
    // Assets позволяет идентифицировать пару, указав оба составляющих актива.
    message Assets {
      // Исходный (базовый) актив пары.
      mlmbox.types.Asset.Id source_asset = 1;
      // Целевой (котируемый) актив пары.
      mlmbox.types.Asset.Id target_asset = 2;
    }
    oneof query {
      // Числовой идентификатор торговой пары.
      uint32 asset_pair_id = 1;
      // Каноническое имя пары (например, "USDT_TON").
      string asset_pair_name = 2;
      // Пара, идентифицированная через составляющие исходный и целевой активы.
      Assets assets = 3;
    }
  }

  // List — коллекция записей AssetPair, возвращаемая списочными запросами.
  message List {
    repeated mlmbox.types.AssetPair items = 1;
  }

  // Числовой идентификатор данной торговой пары.
  uint32 asset_pair_id = 1;
  // Каноническое имя пары, как правило в формате "ИСТОЧНИК_ЦЕЛЬ" (например, "USDT_TON").
  string asset_pair_name = 2;
  // Идентификатор исходного (базового) актива.
  uint32 source_asset_id = 3;
  // Идентификатор целевого (котируемого) актива.
  uint32 target_asset_id = 4;
}