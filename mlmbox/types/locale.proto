syntax = "proto3";

package mlmbox.types;

// Locale представляет поддерживаемый язык/региональный параметр интерфейса платформы.
// Коды локали соответствуют формату IETF BCP 47 (например, "en-US", "ru-RU", "zh-CN").
message Locale {

  // Id — скалярная обёртка, используемая когда в запросе требуется только код локали
  // (например, для поиска локали или смены языка пользователя).
  message Id {
    // Код локали BCP 47, определяющий желаемый язык и регион.
    string locale = 1;
  }

  // List — коллекция поддерживаемых записей Locale,
  // возвращаемая конечной точкой перечисления локалей.
  message List {
    repeated Locale items = 1;
  }

  // Код локали BCP 47 (например, "en-US", "ru-RU").
  string locale = 1;
  // Человекочитаемое отображаемое название локали (например, "English (US)", "Русский").
  string title = 2;
}
