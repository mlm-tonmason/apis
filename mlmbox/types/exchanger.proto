syntax = "proto3";

package mlmbox.types;
import "mlmbox/types/asset_pair.proto";

// Exchanger объединяет типы, связанные с функцией внутреннего обмена валют на платформе.
// Курсы обмена поддерживаются для каждой торговой пары и периодически обновляются
// подсистемой управления курсами.
message Exchanger {

  // Rate хранит текущие курсы покупки и продажи для заданной торговой пары.
  // Поле rate_buy — цена, по которой платформа продаёт целевой актив пользователю;
  // rate_sell — цена, по которой платформа покупает целевой актив у пользователя.
  message Rate {
    // List — коллекция записей Rate, возвращаемая запросом "все курсы обмена".
    message List {
      repeated mlmbox.types.Exchanger.Rate items = 1;
    }

    // Торговая пара, к которой применяется данный курс (например, USDT → TON).
    mlmbox.types.AssetPair asset_pair = 1;
    // Курс покупки — количество исходного актива за единицу целевого
    // (платформа продаёт целевой актив пользователю по данной цене). Десятичная строка.
    string rate_buy = 2;
    // Курс продажи — количество исходного актива за единицу целевого
    // (платформа покупает целевой актив у пользователя по данной цене). Десятичная строка.
    string rate_sell = 3;
    // Unix-временная метка последнего обновления курса.
    uint32 modified_at = 4;
  }
}
