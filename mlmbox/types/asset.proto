syntax = "proto3";

package mlmbox.types;

// Asset представляет торгуемую валюту или токен, поддерживаемый платформой.
// Активы идентифицируются числовым ID и каноническим именем (например, "USDT", "TON").
// Поле decimal определяет точность при представлении балансов и сумм.
message Asset {

  // Id — полиморфный идентификатор, позволяющий ссылаться на актив
  // либо по числовому ID, либо по каноническому имени.
  message Id {
    oneof unique_field {
      // Числовой идентификатор актива, назначаемый платформой.
      uint32 asset_id = 1;
      // Каноническое имя актива (например, "USDT", "TON", "BNB").
      string asset_name = 2;
    }
  }

  // List — постраничная или полная коллекция записей Asset.
  message List {
    repeated mlmbox.types.Asset items = 1;
  }

  // Amount связывает актив с конкретным значением в виде десятичной строки;
  // используется для ценообразования, выставления счётов и отображения балансов.
  message Amount {
    // Идентификатор актива, к которому относится данная сумма.
    uint32 asset_id = 1;
    // Сумма в виде десятичной строки (например, "12.500000").
    string value = 2;
  }

  // Числовой идентификатор, уникальный в рамках платформы.
  uint32 asset_id = 1;
  // Короткое каноническое имя актива (например, "USDT").
  string asset_name = 2;
  // Человекочитаемое отображаемое название актива (например, "Tether USD").
  string asset_title = 3;
  // Количество знаков после запятой для сумм данного актива.
  uint32 decimal = 4;
}