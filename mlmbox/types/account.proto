syntax = "proto3";

package mlmbox.types;

import "mlmbox/types/asset.proto";
import "mlmbox/types/relationship.proto";
import "mlmbox/types/bonus.proto";
import "mlmbox/types/league.proto";

// Account — корневой доменный тип, представляющий зарегистрированного участника
// платформы MLMBox. Объединяет идентификацию, профиль, позиции матрицы, данные
// кошелька, роли и состояние онбординга в единый составной объект, возвращаемый
// RPC Account.Info.
message Account {

  // Id — полиморфный идентификатор аккаунта, принимаемый запросными конечными точками.
  // Вызывающая сторона может ссылаться на аккаунт по числовому ID, строке логина
  // или идентификатору реферальной ссылки, использованной при регистрации.
  message Id {
    oneof unique_field {
      // Числовой идентификатор аккаунта (первичный ключ).
      uint32 account_id = 1;
      // Уникальный буквенно-цифровой логин, выбранный участником.
      string account_login = 2;
      // Идентификатор реферальной ссылки (ref_link_id), использованной при регистрации.
      string ref_link_id = 3;
    }
  }

  // RefLink описывает реферальную атрибуцию аккаунта — какой аккаунт и какой
  // источник реферальной ссылки использовались при регистрации участника.
  message RefLink {
    // Аккаунт, владеющий реферальной ссылкой (ID аккаунта-спонсора).
    uint32 account_id = 1;
    // Источник управления (реферальный канал), использованный при регистрации.
    uint32 source_id = 2;
  }

  // Username — компактный объект идентификации аккаунта, объединяющий числовой ID,
  // логин и идентификатор реферальной ссылки.
  message Username {
    // Числовой идентификатор аккаунта.
    uint32 id = 1;
    // Уникальная строка логина аккаунта.
    string login = 2;
    // Идентификатор реферальной ссылки аккаунта по умолчанию.
    string ref_link_id = 3;
  }

  // Profile хранит публично видимые атрибуты идентификации аккаунта.
  message Profile {

    // Ava представляет выбранное изображение аватара из курируемой коллекции
    // в стиле NFT. Аватар идентифицируется по ID коллекции и ID сущности в ней.
    message Ava {
      // Generate объединяет типы запроса/ответа для конечной точки
      // предварительного просмотра генерации аватаров.
      message Generate {
        // Request задаёт количество мужских и женских вариантов аватаров для генерации.
        message Request {
          // Количество мужских вариантов аватаров для генерации.
          uint32 male_quantity = 1;
          // Количество женских вариантов аватаров для генерации.
          uint32 female_quantity = 2;
        }
        // Response возвращает сгенерированные варианты аватаров, сгруппированные по полу.
        message Response {
          // Сгенерированные мужские варианты аватаров.
          repeated mlmbox.types.Account.Profile.Ava males = 1;
          // Сгенерированные женские варианты аватаров.
          repeated mlmbox.types.Account.Profile.Ava females = 2;
        }
      }
      // Идентификатор коллекции аватаров (соответствует NFT-коллекции).
      uint32 collection_id = 1;
      // Идентификатор конкретного аватара в коллекции.
      uint32 entity_id = 2;
    }

    // Telegram хранит идентификацию владельца аккаунта в Telegram, используемую
    // для доставки уведомлений и аутентификации через бота.
    message Telegram {
      // Числовой ID пользователя в Telegram.
      uint64 id = 1;
      // Имя пользователя в Telegram (без символа @).
      string username = 2;
    }

    // Имя владельца аккаунта, указанное при настройке профиля.
    string first_name = 1;
    // Фамилия владельца аккаунта.
    string last_name = 2;
    // Привязанная идентификация в Telegram (заполняется после Telegram-аутентификации).
    Telegram telegram = 3;
    // Текущий выбранный аватар.
    Ava ava = 4;
  }

  // Statistics содержит агрегированные сетевые и финансовые метрики аккаунта.
  message Statistics {

    // Full расширяет базовую Statistics балансами по активам и разбивкой бонусов,
    // возвращается RPC GetStatisticsFull.
    message Full {
      // Asset объединяет баланс актива со статистикой бонусного дохода.
      message Asset {
        // Актив, к которому относится данная строка статистики.
        uint32 asset_id = 1;
        // Текущий баланс актива в виде десятичной строки.
        string asset_balance = 2;
        // Агрегированная статистика бонусного дохода по данному активу.
        mlmbox.types.Bonus.Summary income_bonuses_statistics = 3;
      }
      // Базовая сетевая статистика.
      Statistics statistics = 1;
      // Разбивка баланса и бонусов по активам.
      repeated Asset assets = 2;
    }

    // Общее количество лично приглашённых партнёров (рефералы первой линии).
    uint32 partners_quantity = 1;
    // Общее количество аккаунтов во всей структуре нижней линии.
    uint32 team_quantity = 2;
    // Количество партнёров, активных в маркетинговой программе.
    uint32 marketing_partners_quantity = 3;
    // Количество участников команды, активных в маркетинговой программе.
    uint32 marketing_team_quantity = 4;
    // Суммарные бонусы матрицы, заработанные по всем деревьям (десятичная строка).
    string total_earned_bonus_matrix = 5;
  }

  // Info — основная сводка аккаунта, возвращаемая списочными и сетевыми запросами.
  // Объединяет идентификацию, спонсорство, структурные данные и статистику в единый объект
  // для отображения в списках партнёров и таблицах лидеров.
  message Info {
    // List — коллекция записей Info, возвращаемая поисковыми и списочными запросами.
    message List {
      repeated mlmbox.types.Account.Info items = 1;
    }

    // Публичный профиль (имя, аватар, Telegram).
    Profile profile = 1;
    // Идентификация данного аккаунта (ID, логин, реферальная ссылка).
    Username account = 2;
    // Идентификация прямого спонсора данного аккаунта.
    Username sponsor = 3;
    // Структурное отношение данного аккаунта к просматривающему аккаунту.
    mlmbox.types.Relationship relationship = 4;
    // Unix-временная метка регистрации данного аккаунта.
    uint32 registration_at = 5;
    // Unix-временная метка первой активации позиции матрицы (дата начала маркетинга).
    uint32 marketing_started_at = 6;
    // Битовая маска ID деревьев, в которых аккаунт имеет хотя бы одну позицию.
    uint32 tree_ids_bit_mask = 7;
    // Индекс ветки на позиции матрицы спонсора, занятой данным аккаунтом.
    uint32 sponsor_branch = 8;
    // Агрегированная сетевая и финансовая статистика.
    Statistics statistics = 9;
    // Список ID каналов уведомлений, на которые подписан аккаунт.
    repeated uint32 channels = 10;
    // Текущее положение данного аккаунта в лиге.
    mlmbox.types.League.Rank league_rank = 11;
  }

  // Mentor описывает состояние подписки аккаунта на AI-ментора.
  message Mentor {
    // Идентификатор приобретённого тарифного плана AI.
    uint32 ai_package_id = 1;
    // Признак наличия активной подписки на AI-ментора.
    bool subscribed = 2;
    // Unix-временная метка истечения текущей подписки.
    uint32 subscribed_until = 3;
    // Общее количество обращений к AI-ментору, разрешённых за период.
    uint32 messages_limit = 4;
    // Количество обращений к AI-ментору, использованных в текущем периоде.
    uint32 messages_used = 5;
  }

  // Intro отслеживает состояние онбординг-инструктажа для новых участников.
  message Intro {
    // Status описывает, на каком этапе онбординга находится участник.
    enum Status {
      // Онбординг ещё не начат.
      NOT_STARTED = 0;
      // Онбординг активно выполняется.
      IN_PROGRESS = 1;
      // Онбординг успешно завершён.
      COMPLETED = 2;
      // Участник намеренно пропустил онбординг.
      SKIPPED = 3;
    }
    // Текущий статус онбординга.
    Status status = 1;
    // Индекс последнего завершённого шага в последовательности онбординга.
    uint32 step = 2;
  }

  // Полный снимок аккаунта, включая info, позиции матрицы, роли и настройки.
  Info info = 1;
  // Все позиции матрицы данного аккаунта по деревьям.
  repeated mlmbox.types.TreeAccount tree_accounts = 2;
  // Битовая маска флагов ролей, назначенных данному аккаунту (например, admin, moderator).
  uint32 roles_bit_mask = 3;
  // Активная локаль интерфейса для данного аккаунта (код BCP 47, например "en-US").
  string locale = 4;
  // Разрешено ли данному аккаунту изменять реферального спонсора.
  bool referral_change_access = 5;
  // Разрешено ли данному аккаунту изменять аватар.
  bool ava_change_access = 6;
  // Количество изменений аватара, уже использованных данным аккаунтом.
  uint32 ava_changes_quantity = 7;
  // Детали подписки на AI-ментора.
  Mentor mentor = 8;
  // Состояние онбординг-инструктажа.
  Intro intro = 9;
}

// Tree представляет одно дерево матрицы (маркетинговую программу), доступное на платформе.
// Каждое дерево определяет топологию (ширину, ёмкость позиций), ценообразование,
// доступность бронирования и зависимость от других деревьев.
message Tree {
  // Mode классифицирует тип алгоритма матрицы, используемого в дереве.
  enum Mode {
    // Неуказанный или устаревший режим.
    UNKNOWN = 0;
    // Стандартный алгоритм размещения матрицы.
    MATRIX = 1;
  }

  // Group — логическая категория группировки деревьев, используемая в интерфейсе
  // для объединения нескольких деревьев под общей меткой.
  message Group {
    // Числовой идентификатор группы.
    uint32 id = 1;
    // Отображаемое название группы (например, "Базовый", "Премиум").
    string title = 2;
  }

  // Числовой идентификатор дерева.
  uint32 id = 1;
  // Человекочитаемое название дерева, отображаемое в интерфейсе.
  string title = 2;
  // Идентификатор группы, к которой относится данное дерево.
  uint32 group_id = 3;
  // Общее количество позиций в одном полном цикле матрицы.
  uint32 positions_quantity = 4;
  // Ширина ветвления по умолчанию (количество дочерних слотов на позицию).
  uint32 default_position_width = 5;
  // Стоимость приобретения одной позиции в данном дереве.
  mlmbox.types.Asset.Amount amount = 6;
  // Разрешено ли бронирование позиций (резервация до активации).
  bool booking_enabled = 7;
  // Режим алгоритма матрицы, используемый данным деревом.
  Mode tree_mode_id = 8;
  // Список ID деревьев, в которых необходима активная позиция перед вступлением
  // в данное дерево (обязательные предварительные деревья).
  repeated uint32 require_tree_ids = 9;
}

// TreeAccount представляет связь между аккаунтом и конкретным деревом матрицы,
// отслеживая количество позиций, активаций, баланс пула и отдельные сущности позиций.
message TreeAccount {

  // Id однозначно идентифицирует пару (дерево, аккаунт).
  message Id {
    // Дерево матрицы.
    uint32 tree_id = 1;
    // Аккаунт в данном дереве.
    uint32 account_id = 2;
  }

  // List — коллекция записей TreeAccount.
  message List {
    repeated TreeAccount items = 1;
  }

  // Entity описывает одну позицию матрицы, принадлежащую аккаунту в данном дереве.
  message Entity {
    // Числовой идентификатор данной позиции матрицы.
    uint32 position_id = 1;
    // Идентификатор цепочки: 0 = основная цепочка, >0 = отдельная подцепочка,
    // созданная событием переполнения/реинвестирования матрицы.
    uint32 tree_chain_id = 2;
    // Порядковый номер позиции в дереве (глобальный счётчик).
    uint32 tree_entity_id = 3;
    // Порядковый номер позиции в рамках пары (дерево + аккаунт).
    uint32 tree_account_entity_id = 4;
    // Битовая маска, показывающая, какие комбинации ширины 2/глубины 2 ветвей заполнены.
    uint32 filled_2w2l_bit_mask = 5;
    // Признак того, что все дочерние слоты цикла данной позиции заняты.
    bool filled = 6;
    // Разрешён ли аутентифицированному аккаунту просмотр данной позиции.
    bool view_access = 7;
  }

  // Set — расширенный снимок TreeAccount, включающий детали первичной сущности;
  // используется в сетевых/командных запросах, где полный список сущностей не нужен.
  message Set {
    // Дерево матрицы, к которому относится данный набор.
    uint32 tree_id = 1;
    // Общее количество позиций, приобретённых аккаунтом в данном дереве.
    uint32 quantity = 2;
    // Количество позиций, которые были активированы (оплачены и размещены).
    uint32 activated_quantity = 3;
    // Суммарные единицы ёмкости, занятые активированными позициями.
    uint32 activated_capacity = 4;
    // Накопленное значение пула аккаунта в данном дереве (десятичная строка).
    string pool_value = 5;
    // Количество забронированных, но ещё не активированных позиций.
    uint32 booking_quantity = 6;
    // Первичная (последняя созданная) сущность для данной пары (дерево, аккаунт).
    Entity entity = 7;
  }

  // Дерево матрицы, к которому относится данная запись.
  uint32 tree_id = 1;
  // Общее количество позиций, приобретённых аккаунтом в данном дереве.
  uint32 quantity = 2;
  // Количество активированных (размещённых) позиций.
  uint32 activated_quantity = 3;
  // Суммарная ёмкость, занятая активированными позициями.
  uint32 activated_capacity = 4;
  // Накопленное значение пула (десятичная строка).
  string pool_value = 5;
  // Количество забронированных (ожидающих активации) позиций.
  uint32 booking_quantity = 6;
  // Все отдельные сущности позиций для данной пары (дерево, аккаунт).
  repeated Entity entities = 7;
}

// PositionView объединяет типы идентификаторов и запросов, используемые для задания
// точки просмотра при отрисовке визуализации матрицы.
message PositionView {

  // Id выбирает конкретную позицию матрицы в качестве корня визуализации.
  message Id {
    // Позиция, используемая в качестве корня просмотра.
    uint32 view_position_id = 1;
  }

  // Team выбирает корень просмотра либо по прямому ID позиции, либо по паре
  // (дерево, аккаунт), и задаёт глубину отрисовки.
  message Team {
    // Количество уровней матрицы для включения в представление (глубина).
    uint32 view_level = 1;
    oneof query {
      // Отрисовать матрицу с корнем в данной конкретной позиции.
      uint32 view_position_id = 2;
      // Отрисовать матрицу с корнем в первичной позиции данной пары (дерево, аккаунт).
      TreeAccount.Id tree_account = 3;
    }
  }
}

// Matrix объединяет типы для визуализации матрицы и управления настройками реинвестирования.
message Matrix {

  // Reinvest объединяет типы запросов для обновления настроек реинвестирования
  // на позиции матрицы.
  message Reinvest {
    // Request содержит идентификатор позиции и желаемое состояние флага реинвестирования.
    message Request {
      // Позиция, настройку реинвестирования которой необходимо обновить.
      uint32 position_id = 1;
      // True — включить автоматическое реинвестирование выплат в новую позицию;
      // false — получать выплаты в виде зачислений на кошелёк.
      bool reinvest_enabled = 2;
    }
  }

  // Position — полный дескриптор одного слота матрицы, включая его структурное
  // размещение, владение и финансовое состояние.
  message Position {
    // Уникальный идентификатор данной позиции матрицы.
    uint32 position_id = 1;
    // Идентификатор вышестоящей (родительской) позиции в матрице.
    uint32 position_sponsor_id = 2;
    // Индекс ветки на вышестоящей позиции, занятой данной позицией.
    uint32 position_sponsor_branch = 3;
    // Количество прямых дочерних слотов, доступных на данной позиции.
    uint32 position_width = 4;
    // Аккаунт, которому принадлежит данная позиция.
    uint32 account_id = 5;
    // Идентификатор цепочки (0 = основная, >0 = переполненная подцепочка).
    uint32 tree_chain_id = 6;
    // Глобальный порядковый номер данной позиции в дереве.
    uint32 tree_entity_id = 7;
    // Порядковый номер данной позиции среди позиций владеющего аккаунта.
    uint32 tree_account_entity_id = 8;
    // Количество прямых партнёрских позиций, размещённых под данной позицией.
    uint32 partners_quantity = 9;
    // Общее количество позиций в нижней линии данной позиции.
    uint32 team_quantity = 10;
    // Значение пула, накопленного данной позицией (десятичная строка).
    string pool_value = 11;
    // Признак автоматического реинвестирования выплат по данной позиции.
    bool reinvest_enabled = 12;
    // Признак того, что все дочерние слоты цикла данной позиции заняты.
    bool filled = 13;
    // Unix-временная метка создания данной позиции.
    uint32 created_at = 14;
  }

  // View — полная полезная нагрузка визуализации матрицы, возвращаемая RPC Matrix.View.
  // Содержит все позиции в запрошенном окне глубины, а также связанные данные аккаунтов.
  message View {
    // Идентификатор дерева для данного представления.
    uint32 tree_id = 1;
    // Позиция аутентифицированного аккаунта, являющаяся якорем данного представления.
    uint32 self_position_id = 2;
    // Битовая маска деревьев, в которых аутентифицированный аккаунт имеет позиции.
    uint32 self_tree_ids_bit_mask = 3;
    // Позиция, используемая как визуальный корень отрисованной матрицы.
    uint32 view_position_id = 4;
    // Битовая маска деревьев, в которых просматриваемый аккаунт имеет позиции.
    uint32 view_tree_ids_bit_mask = 5;
    // Все позиции матрицы в отрисованном окне глубины.
    repeated Position positions = 6;
    // Записи Account.Info для всех аккаунтов, упомянутых в списке позиций.
    repeated mlmbox.types.Account.Info accounts = 7;
    // Записи сущностей TreeAccount для просматриваемого аккаунта по всем позициям.
    repeated mlmbox.types.TreeAccount.Entity view_tree_account_entities = 8;
  }

  // Info возвращает полный список записей TreeAccount для аккаунта,
  // предоставляя обзор участия во всех деревьях.
  message Info {
    repeated mlmbox.types.TreeAccount items = 1;
  }
}