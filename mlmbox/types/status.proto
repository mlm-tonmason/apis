syntax = "proto3";

package mlmbox.types;

// Status объединяет все перечисления статусов уровня платформы в единое пространство имён.
// Эти перечисления возвращаются конечными точками аутентификации, рефералов,
// валидации токенов и финансовых транзакций.
message Status {

  // Auth описывает результат попытки аутентификации.
  // Указывает, был ли вызывающий распознан как существующий участник
  // или зарегистрирован как новый.
  enum Auth {
    // Вызывающий не аутентифицирован (гостевой доступ).
    AUTH_GUEST = 0;
    // Вызывающий успешно аутентифицирован как существующий аккаунт.
    AUTH_SIGN_IN = 1;
    // Создан новый аккаунт, вызывающий зарегистрирован.
    AUTH_SIGN_UP = 2;
  }

  // Sponsor описывает результат попытки назначения реферала (спонсора).
  enum Sponsor {
    // Спонсор не был привязан — ссылка отсутствует или недействительна.
    SPONSOR_UNKNOWN = 0;
    // Предоставленная реферальная ссылка некорректна или не ведёт к аккаунту.
    SPONSOR_WRONG_LINK = 1;
    // У аккаунта уже есть спонсор, и изменить его невозможно.
    SPONSOR_BUSY = 2;
    // Действительный спонсор найден и успешно привязан к аккаунту.
    SPONSOR_EXISTS = 3;
  }

  // TokenValidate описывает состояние действительности токена доступа.
  enum TokenValidate {
    // Состояние токена не удалось определить (например, ошибка разбора).
    TOKEN_VALIDATE_UNKNOWN = 0;
    // Токен действителен, связанная сессия активна.
    TOKEN_VALIDATE_ACTIVATED = 1;
    // Токен истёк и больше не является действительным.
    TOKEN_VALIDATE_EXPIRED = 2;
    // Подпись или структура токена недействительны.
    TOKEN_VALIDATE_INVALID = 3;
  }

  // Transaction описывает жизненный цикл финансовой транзакции.
  enum Transaction {
    // Транзакция отправлена и ожидает подтверждения или расчёта.
    TRANSACTION_PROCESSING = 0;
    // Транзакция успешно завершена, балансы обновлены.
    TRANSACTION_SUCCESS = 1;
    // Транзакция отклонена (например, недостаточно средств, блокировка комплаенс).
    TRANSACTION_REJECTED = 2;
  }
}