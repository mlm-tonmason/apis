syntax = "proto3";

package mlmbox.types;

// Sort задаёт порядок сортировки и размер страницы для списочных запросов по всему API.
// Переиспользуется в нескольких сервисах (Network, Finance, League и др.) как единый
// контракт пагинации и упорядочивания.
message Sort {
  // Direction управляет направлением обхода результирующего набора.
  enum Direction {
    // Восходящий порядок — сначала самые старые или с наименьшим ID (по умолчанию).
    FORWARD = 0;
    // Нисходящий порядок — сначала самые новые или с наибольшим ID.
    BACKWARD = 1;
  }

  // Желаемое направление обхода результирующего набора.
  Direction direction = 1;
  // Максимальное количество возвращаемых записей. Должно быть не менее 1.
  uint32 limit = 2;
}
