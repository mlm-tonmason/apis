syntax = "proto3";

package mlmbox.client.network;

import "mlmbox/types/account.proto";
import "mlmbox/types/sort.proto";

// Network предоставляет поиск аккаунтов и просмотр иерархии команды для
// аутентифицированных участников. Методы разделены на два уровня доступа:
//
//  - Глобальный доступ (MemberGet, MemberSearch): любой аккаунт может быть найден
//    по логину без структурных ограничений.
//  - Доступ через структуру спонсоров (TeamInfo, TeamSearch, TeamPartnerList, TeamTop):
//    результаты ограничены аккаунтами, доступными через собственную реферальную структуру участника.
service Network {

  // MemberGet возвращает публичную запись Account.Info для любого аккаунта на платформе.
  // Доступ неограничен — любой аутентифицированный участник может найти любого другого.
  rpc MemberGet (mlmbox.types.Account.Id) returns (mlmbox.types.Account.Info) {}

  // MemberSearch находит аккаунты, логин которых начинается с указанного префикса.
  // Доступ глобальный (без ограничений). Подходит для компонентов автодополнения UI.
  rpc MemberSearch (AccountsSearchRequest) returns (mlmbox.types.Account.Info.List) {}

  // TeamInfo возвращает Account.Info указанного аккаунта, цепочку его спонсоров (upline)
  // и список лично приглашённых партнёров (первая линия downline). Доступ ограничен
  // аккаунтами в структуре спонсоров аутентифицированного участника.
  rpc TeamInfo (TeamRequest) returns (TeamResponse) {}

  // TeamSearch находит аккаунты внутри структуры спонсоров аутентифицированного участника,
  // логин которых начинается с указанного префикса.
  rpc TeamSearch (AccountsSearchRequest) returns (mlmbox.types.Account.Info.List) {}

  // TeamPartnerList возвращает постраничный список лично приглашённых партнёров указанного
  // аккаунта в рамках структуры спонсоров аутентифицированного участника.
  // Поддерживает курсорную постраничную навигацию через step_sponsor_branch.
  rpc TeamPartnerList (TeamPartnerListRequest) returns (mlmbox.types.Account.Info.List) {}

  // TeamTop возвращает отсортированный рейтинг лучших аккаунтов в структуре спонсоров
  // аутентифицированного участника по умолчанию по метрике платформы.
  rpc TeamTop (TeamTopRequest) returns (mlmbox.types.Account.Info.List) {}
}

// AccountsSearchRequest содержит префикс логина и максимальное количество результатов
// для RPC MemberSearch и TeamSearch.
message AccountsSearchRequest {
  // Префикс для поиска по логинам аккаунтов (без учёта регистра).
  string login_prefix = 1;
  // Максимальное количество совпадающих аккаунтов для возврата.
  uint32 limit = 2;
}

// TeamRequest задаёт просматриваемый аккаунт и параметры постраничной навигации/фильтрации.
message TeamRequest {
  // Аккаунт, для которого запрашивается информация о команде. При пустом значении
  // по умолчанию используется аккаунт аутентифицированного участника.
  mlmbox.types.Account.Id view_partner = 1;
  // Направление сортировки и размер страницы для подсписка партнёров.
  mlmbox.types.Sort partners_sort = 2;
  // Битовая маска ID деревьев для фильтрации результатов. -1 = все деревья.
  int32 filter_tree_ids_bit_mask = 3;
}

// TeamResponse возвращается RPC TeamInfo: содержит запрошенный аккаунт, цепочку спонсоров,
// список партнёров и сводку позиций по деревьям.
message TeamResponse {
  // Публичная информация запрошенного аккаунта.
  mlmbox.types.Account.Info account = 1;
  // Цепочка спонсоров от прямого спонсора до корня структуры.
  repeated mlmbox.types.Account.Info sponsors = 2;
  // Лично приглашённые партнёры (рефералы первой линии) запрошенного аккаунта.
  repeated mlmbox.types.Account.Info partners = 3;
  // Сводки позиций по деревьям для запрошенного аккаунта.
  repeated mlmbox.types.TreeAccount.Set account_tree_accounts = 4;
}

// TeamPartnerListRequest обеспечивает постраничный просмотр списка партнёров
// указанного аккаунта в рамках структуры аутентифицированного участника.
message TeamPartnerListRequest {
  // Базовый запрос: целевой аккаунт, порядок сортировки и фильтр по деревьям.
  TeamRequest request = 1;
  // Курсорный индекс ветки спонсора для постраничной навигации. 0 = первая страница.
  uint32 step_sponsor_branch = 2;
}

// TeamTopRequest задаёт аккаунт и параметры сортировки для RPC TeamTop.
message TeamTopRequest {
  // Аккаунт, для чьей нижней линии запрашивается рейтинг лучших.
  // По умолчанию — аутентифицированный участник.
  mlmbox.types.Account.Id view_partner = 1;
  // Направление сортировки и максимальное количество лучших аккаунтов.
  mlmbox.types.Sort partners_sort = 2;
}