syntax = "proto3";

package mlmbox.client.app;

import "google/protobuf/empty.proto";
import "mlmbox/types/scheme.proto";

// App предоставляет общеплатформенную информацию для начальной загрузки,
// необходимую клиентским приложениям при старте. Возвращаемых данных достаточно
// для инициализации каталога активов, курсов обмена, списка локалей,
// конфигураций провайдеров кошелька и топологии деревьев матрицы
// без дополнительных обращений к серверу.
service App {

  // SchemeInfo возвращает полный снимок конфигурации платформы (Scheme),
  // агрегируя активы, курсы обмена, локали, настройки кошелька, топологию деревьев матрицы
  // и текущее глобальное количество участников в одном ответе.
  // Клиенты должны вызывать этот метод при старте и периодически обновлять данные,
  // либо при получении уведомления metrics_accounts_quantity.
  rpc SchemeInfo (google.protobuf.Empty) returns (mlmbox.types.Scheme) {}
}
